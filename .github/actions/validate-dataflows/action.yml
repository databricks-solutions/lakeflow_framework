# Composite action: validate *_main.json dataflow specs using schemas from this repo.
#
# Example (caller repository workflow):
#
#   jobs:
#     validate:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v4
#         - uses: your-org/lakeflow_framework/.github/actions/validate-dataflows@main
#           with:
#             path: src
#
# Pin to a tag or SHA for reproducible builds (e.g., replace @main with @v0.11.0)

name: Validate dataflows
description: |
  Run the Lakeflow ``scripts/validate_dataflows.py`` checker against paths in **your**
  repository (schemas and mappings are taken from the **lakeflow_framework** revision
  that contains this action).

  Requires ``actions/checkout`` of your repo first so ``path`` resolves under
  ``github.workspace``.

branding:
  icon: check-circle
  color: green

inputs:
  path:
    description: >
      Directory or single ``*_main.json`` file to validate, relative to the workflow
      workspace (same semantics as the script's positional argument).
    required: false
    default: '.'
  no-mapping:
    description: >
      If ``true``, skip dataflow spec version mapping (strict validation only).
    required: false
    default: 'false'
  verbose:
    description: If ``true``, pass ``-v`` to the script for extra logging.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install jsonschema
      shell: bash
      run: python -m pip install --upgrade pip jsonschema

    - name: Validate dataflows
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        SCRIPT: ${{ github.action_path }}/../../../scripts/validate_dataflows.py
        VALIDATE_PATH: ${{ inputs.path }}
        VERBOSE: ${{ inputs.verbose }}
        NO_MAPPING: ${{ inputs.no-mapping }}
      run: |
        set -euo pipefail
        if [ ! -f "$SCRIPT" ]; then
          echo "Expected script at $SCRIPT (is this action checked out correctly?)"
          exit 1
        fi
        ARGS=()
        if [ "$VERBOSE" = "true" ]; then
          ARGS+=( -v )
        fi
        if [ "$NO_MAPPING" = "true" ]; then
          ARGS+=( --no-mapping )
        fi
        ARGS+=( "$VALIDATE_PATH" )
        exec python "$SCRIPT" "${ARGS[@]}"
