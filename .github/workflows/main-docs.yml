name: Deploy Lakeflow Framework Documentation to GitHub Pages

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on:
      group: databricks-solutions-protected-runner-group
      labels: linux-ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Configure JFrog PyPI registry (OIDC)
        uses: ./.github/actions/setup-jfrog
        with:
          configure-pip: 'true'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes --no-deps -r requirements-docs.lock

      - name: Build versioned HTML
        run: |
          bash docs/scripts/build_versioned_docs.sh

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: 'docs/build/html'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on:
      group: databricks-solutions-protected-runner-group
      labels: linux-ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
