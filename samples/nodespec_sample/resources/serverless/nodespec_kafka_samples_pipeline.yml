resources:
  pipelines:
    lakeflow_samples_nodespec_kafka_samples_pipeline:
      name: Lakeflow Framework - Nodespec - Kafka Samples Pipeline (${var.logical_env})
      channel: PREVIEW
      serverless: true
      catalog: ${var.catalog}
      schema: ${var.schema}
      libraries:
        - notebook:
            path: ${var.framework_source_path}/dlt_pipeline
      configuration:
        bundle.sourcePath: ${workspace.file_path}/src
        bundle.target: ${bundle.target}
        framework.sourcePath: ${var.framework_source_path}
        workspace.host: ${var.workspace_host}
        logicalEnv: ${var.logical_env}
        pipeline.dataFlowGroupFilter: nodespec_kafka_samples
      root_path: ${workspace.file_path}/src/dataflows/kafka_samples
