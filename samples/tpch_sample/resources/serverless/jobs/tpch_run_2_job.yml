resources:
  jobs:
    lakeflow_samples_tpch_run_2_job:
      name: Lakeflow Framework - TPCH Samples - 2 - Run 2 - Dim + Fact Updates (${var.logical_env})
      queue:
        enabled: true
      tasks:
        # Append focused dimension updates + significant fact batch, then process incrementally.
        - task_key: run_2_staging_load
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/run_2_staging_load
            base_parameters:
              catalog: ${var.catalog}
              schema_namespace: ${var.schema_namespace}
              logical_env: ${var.logical_env}

        - task_key: bronze_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_samples_tpch_bronze_pipeline.id}
            full_refresh: false
          depends_on:
            - task_key: run_2_staging_load

        - task_key: silver_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_samples_tpch_silver_pipeline.id}
            full_refresh: false
          depends_on:
            - task_key: bronze_pipeline

        - task_key: gold_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_samples_tpch_gold_pipeline.id}
            full_refresh: false
          depends_on:
            - task_key: silver_pipeline
