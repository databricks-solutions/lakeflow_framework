resources:
  pipelines:
    lakeflow_samples_nodester_feature_materialized_views_pipeline:
      name: Lakeflow Framework - Nodester - Feature Samples Materialized Views Pipeline (${var.logical_env})
      channel: CURRENT
      serverless: true
      catalog: ${var.catalog}
      schema: ${var.schema}
      libraries:
        - notebook:
            path: ${var.framework_source_path}/dlt_pipeline
      configuration:
        bundle.sourcePath: ${workspace.file_path}/src
        bundle.target: ${bundle.target}
        framework.sourcePath: ${var.framework_source_path}
        workspace.host: ${var.workspace_host}
        pipeline.layer: ${var.layer}
        logicalEnv: ${var.logical_env}
        pipeline.dataFlowGroupFilter: nodester_feature_samples_materialized_views
      root_path: ${workspace.file_path}/src/dataflows/feature_samples
