# Databricks Asset Bundle — Pattern Samples
# End-to-end medallion architecture patterns: bronze → silver → gold.
bundle:
  name: pattern_samples

include:
  - scratch/resources/*.yml

variables:
  catalog:
    description: The target UC catalog
  framework_source_path:
    description: The full workspace path to the framework src folder
  schema_namespace:
    description: The schema namespace prefix
    default: "lakeflow_samples"
  bronze_schema:
    description: The UC schema for the bronze layer
  silver_schema:
    description: The UC schema for the silver layer
  gold_schema:
    description: The UC schema for the gold layer
  workspace_host:
    description: Workspace URL used for API calls from Framework
  logical_env:
    description: The logical environment
    default: ""
  pipeline_cluster_config:
    description: Basic cluster config
    default:
      label: default
      autoscale:
        min_workers: 1
        max_workers: 5
        mode: ENHANCED
  job_cluster_name:
    description: The name of the job cluster
    default: "pattern_samples_job_cluster"
  job_cluster_config:
    description: Complete cluster configuration for compute clusters
    default:
      spark_version: "16.4.x-scala2.12"
      node_type_id: "i3.xlarge"
      num_workers: 1
      autoscale:
        min_workers: 1
        max_workers: 5

targets:
  dev:
    mode: development
    default: true
