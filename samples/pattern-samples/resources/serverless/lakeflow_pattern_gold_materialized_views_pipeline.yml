resources:
  pipelines:
    lakeflow_pattern_gold_materialized_views_pipeline:
      name: Lakeflow Framework - Pattern - Gold Materialized Views Pipeline (${var.logical_env})
      channel: CURRENT
      serverless: true
      catalog: ${var.catalog}
      schema: ${var.gold_schema}
      libraries:
        - notebook:
            path: ${var.framework_source_path}/dlt_pipeline
      configuration:
        bundle.sourcePath: ${workspace.file_path}/src
        bundle.target: ${bundle.target}
        framework.sourcePath: ${var.framework_source_path}
        workspace.host: ${var.workspace_host}
        pipeline.layer: gold
        logicalEnv: ${var.logical_env}
        pipeline.dataFlowGroupFilter: base_gold_samples
      root_path: ${workspace.file_path}/src
