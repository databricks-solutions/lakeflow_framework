resources:
  jobs:
    pattern_samples_run_1_job:
      name: Lakeflow Framework - Pattern Samples - Run 1 - Load and Schema Initialization (${var.logical_env})
      tasks:
        - task_key: create_schemas_and_tables
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/create_schemas_and_tables
            base_parameters:
              catalog: ${var.catalog}
              schema_namespace: ${var.schema_namespace}
              logical_env: ${var.logical_env}

        - task_key: staging_load
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/run_1_staging_load
            base_parameters:
              catalog: ${var.catalog}
              schema_namespace: ${var.schema_namespace}
              logical_env: ${var.logical_env}
          depends_on:
            - task_key: create_schemas_and_tables

        - task_key: bronze_base_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_pattern_bronze_base_samples_pipeline.id}
            full_refresh: true
          depends_on:
            - task_key: staging_load


        - task_key: silver_base_samples_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_pattern_silver_base_samples_pipeline.id}
            full_refresh: true
          depends_on:
            - task_key: bronze_base_pipeline

        - task_key: silver_multi_source_streaming_basic_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_pattern_silver_multi_source_streaming_basic_pipeline.id}
            full_refresh: true
          depends_on:
            - task_key: bronze_base_pipeline

        - task_key: silver_multi_source_streaming_decomp_staging_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_pattern_silver_multi_source_streaming_decomp_staging_pipeline.id}
            full_refresh: true
          depends_on:
            - task_key: bronze_base_pipeline

        - task_key: silver_multi_source_streaming_decomp_final_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_pattern_silver_multi_source_streaming_decomp_final_pipeline.id}
            full_refresh: true
          depends_on:
            - task_key: silver_multi_source_streaming_decomp_staging_pipeline

        - task_key: silver_snapshot_flow_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_pattern_silver_snapshot_flow_pipeline.id}
            full_refresh: true
          depends_on:
            - task_key: bronze_base_pipeline

        - task_key: silver_stream_static_basic_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_pattern_silver_stream_static_basic_pipeline.id}
            full_refresh: true
          depends_on:
            - task_key: bronze_base_pipeline

        - task_key: silver_stream_static_streaming_dwh_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_pattern_silver_stream_static_streaming_dwh_pipeline.id}
            full_refresh: true
          depends_on:
            - task_key: bronze_base_pipeline

        - task_key: gold_stream_static_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_pattern_gold_stream_static_pipeline.id}
            full_refresh: true
          depends_on:
            - task_key: silver_base_samples_pipeline

        - task_key: gold_materialized_views_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_pattern_gold_materialized_views_pipeline.id}
            full_refresh: true
          depends_on:
            - task_key: silver_base_samples_pipeline

      queue:
        enabled: true
