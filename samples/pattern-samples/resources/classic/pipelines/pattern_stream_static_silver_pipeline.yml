resources:
  pipelines:
    pattern_stream_static_silver_pipeline:
      name: Lakeflow Framework - Pattern - Stream Static - Silver (${var.logical_env})
      channel: CURRENT
      clusters:
        - ${var.pipeline_cluster_config}
      catalog: ${var.catalog}
      schema: ${var.silver_schema}
      libraries:
        - notebook:
            path: ${var.framework_source_path}/dlt_pipeline
      configuration:
        bundle.sourcePath: ${workspace.file_path}/src
        bundle.target: ${bundle.target}
        framework.sourcePath: ${var.framework_source_path}
        workspace.host: ${var.workspace_host}
        pipeline.layer: silver
        logicalEnv: ${var.logical_env}
        pipeline.dataFlowGroupFilter: stream_static_silver
      root_path: ${workspace.file_path}/src
