# Databricks Asset Bundle — Feature Samples
# Demonstrates all Lakeflow Framework features using a single {feature_schema}.
bundle:
  name: feature_samples

include:
  - scratch/resources/*.yml

variables:
  catalog:
    description: The target UC catalog
  framework_source_path:
    description: The full workspace path to the framework src folder
  schema:
    description: The target UC schema (set to {feature_schema} by deploy script)
  schema_namespace:
    description: The schema namespace prefix
    default: "lakeflow_samples"
  workspace_host:
    description: Workspace URL used for API calls from Framework
  layer:
    description: The target layer
    default: feature
  logical_env:
    description: The logical environment
    default: ""
  pipeline_cluster_config:
    description: Basic cluster config
    default:
      label: default
      autoscale:
        min_workers: 1
        max_workers: 5
        mode: ENHANCED
  job_cluster_name:
    description: The name of the job cluster
    default: "feature_samples_job_cluster"
  job_cluster_config:
    description: Complete cluster configuration for compute clusters
    default:
      spark_version: "16.4.x-scala2.12"
      node_type_id: "i3.xlarge"
      num_workers: 1
      autoscale:
        min_workers: 1
        max_workers: 5

targets:
  dev:
    mode: development
    default: true
