resources:
  jobs:
    kafka_samples_run_job:
      name: Lakeflow Framework - Kafka Samples - Run (${var.logical_env})
      job_clusters:
        - job_cluster_key: ${var.job_cluster_name}
          new_cluster: ${var.job_cluster_config}
      tasks:
        - task_key: create_schemas_and_tables
          job_cluster_key: ${var.job_cluster_name}
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/create_schemas_and_tables
            base_parameters:
              catalog: ${var.catalog}
              schema_namespace: ${var.schema_namespace}
              logical_env: ${var.logical_env}

        - task_key: staging_load
          job_cluster_key: ${var.job_cluster_name}
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/staging_load
            base_parameters:
              catalog: ${var.catalog}
              schema_namespace: ${var.schema_namespace}
              logical_env: ${var.logical_env}
          depends_on:
            - task_key: create_schemas_and_tables

        - task_key: kafka_samples_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakeflow_kafka_samples_pipeline.id}
            full_refresh: true
          depends_on:
            - task_key: staging_load

      queue:
        enabled: true
